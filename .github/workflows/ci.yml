name: CI/CD Pipeline - IKHTARNI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Récupérer le code du dépôt
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2️⃣ Installer Python et Node.js
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    # 3️⃣ Installer les dépendances Python
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install --no-cache-dir -r resume_matcher/requirements.txt

    # 4️⃣ Installer les dépendances Node pour le backend
    - name: Install Node dependencies
      run: |
        cd server
        npm install

    # 5️⃣ Construire l’image Docker pour dummyserver
    - name: Build Docker image for dummyserver
      run: |
        docker build -t ikhtarni-dummyserver .

    # 6️⃣ Lancer un test rapide pour vérifier l’installation
    - name: Test servers
      run: |
        echo "Tests rapides : Node.js et Python installés avec succès"

    # 7️⃣ Déploiement Vercel (exemple, nécessite token)
    - name: Deploy Backend & Frontend to Vercel
      env:
        VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      run: |
        npm install -g vercel
        vercel --prod --yes
